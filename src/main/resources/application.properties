spring.application.name=vue-cms1

server.port=8081

#spring.profiles.active=prod

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/cms?useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=123456

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false


mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
#management.endpoints.web.exposure.include=beans

#logging.level.org.springframework.beans.factory.support=DEBUG
#logging.level.org.mybatis.spring.mapper=DEBUG
#logging.level.com.baomidou.mybatisplus=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000ms

token.ttl.hours=168