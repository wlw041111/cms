name: CMS

on:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '是否强制重新打包构建 (Build & Restart)?'
        required: true
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: Xuweiguang10086/vue-cms1
          fetch-depth: 1
          ref: master

      - name: MD5 Fingerprint Detection
        id: filter
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          CACHE_DIR="/tmp/cms_deploy_cache"
          mkdir -p $CACHE_DIR
          OLD_FINGERPRINT="$CACHE_DIR/last_src_md5.txt"
          CURRENT_FINGERPRINT=$(find src/ pom.xml -type f -exec md5sum {} + | sort | md5sum | cut -d' ' -f1)
          echo "Current Source Fingerprint: $CURRENT_FINGERPRINT"

          NEED_BUILD="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              echo "Decision: Manual Force Build."
              NEED_BUILD="true"
          elif [ ! -f "$OLD_FINGERPRINT" ]; then
              echo "Decision: No cache found. First time build."
              NEED_BUILD="true"
          elif [ "$CURRENT_FINGERPRINT" != "$(cat $OLD_FINGERPRINT)" ]; then
              echo "Decision: Source code changed (Fingerprint mismatch)."
              NEED_BUILD="true"
          else
              echo "Decision: Source code identical. Skip build."
              NEED_BUILD="false"
          fi

          echo "$CURRENT_FINGERPRINT" > "$OLD_FINGERPRINT"
          if [ "$NEED_BUILD" = "true" ]; then
              touch ./RUN_MAVEN_BUILD
              [ -d "target" ] && rm -rf target/
          fi
          echo "code_changed=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: |
          if [ -f "./RUN_MAVEN_BUILD" ]; then
              echo "Executing Maven Build..."
              export JAVA_HOME=/opt/jdk-17.0.12
              export PATH=$JAVA_HOME/bin:/opt/maven/bin:$PATH
              mvn clean package -DskipTests
          else
              echo "Skip Maven: Source code hash is the same."
          fi

      - name: Local Release and Lifecycle Management
        run: |
          export JAVA_HOME=/opt/jdk-17.0.12
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          if [ -f "./RUN_MAVEN_BUILD" ]; then
              echo "Action: Full Versioned Deploy"
              REL_DIR="/app/cms/releases/${{ github.sha }}"
              sudo mkdir -p "$REL_DIR"
          
              # Check if jar exists before copying
              if [ -z "$(ls -A target/*.jar 2>/dev/null)" ]; then
                  echo "ERROR: No jar found in target/"
                  ls -la target/ || true
                  exit 1
              fi
          
              sudo cp target/*.jar "$REL_DIR"/my-cms.jar
          
              # Verify jar was copied
              if [ ! -f "$REL_DIR/my-cms.jar" ]; then
                  echo "ERROR: Jar was not copied to $REL_DIR"
                  ls -la target/ || true
                  exit 1
              fi
          
              # Print checksum for verification
              echo "JAR checksum:"
              sudo sha256sum "$REL_DIR"/my-cms.jar
          
              sudo ln -snf "$REL_DIR"/my-cms.jar /app/cms/current.jar
              cd /app/cms/releases && ls -t | tail -n +6 | xargs sudo rm -rf 2>/dev/null || true
          
              # Restart service
              sudo systemctl restart cms
          
              # Wait for service to bind, with increased timeout (60 seconds)
              echo "Waiting for service to start on port 8080..."
              for i in {1..20}; do
                if ss -tuln | grep -q :8080; then
                  echo "Service UP!"
                  exit 0
                fi
                sleep 3
              done
          
              # Diagnostics if service fails to start
              echo "Service did not start within timeout. Collecting diagnostics..."
          
              echo "=== systemctl status cms ==="
              sudo systemctl status cms --no-pager -l || true
          
              echo "=== last 200 journalctl lines for cms ==="
              sudo journalctl -u cms --no-pager -n 200 || true
          
              echo "=== ss / listening ports (detailed) ==="
              sudo ss -tulpen | grep -E ':8080|LISTEN' || true
          
              echo "=== /app/cms dir listing ==="
              sudo ls -la /app/cms/ || true
              sudo ls -la /app/cms/releases/ || true
          
              # Fail the step
              exit 1
          fi