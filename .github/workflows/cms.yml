name: CMS

on:
  push:
    branches: [ master ]           # main → master
    paths:
      - 'src/**'
      - 'pom.xml'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '是否强制重新打包构建 (Build & Restart)?'
        required: true
        type: boolean
        default: false

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Native Git Checkout with SSH
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          
          echo "Cleaning up workspace..."
          find . -mindepth 1 -delete 2>/dev/null || true
          
          echo "Cloning private repository via SSH..."
          git clone --depth 1 -b master git@github.com:Xuweiguang10086/vue-cms1.git .   # 改这里

      - name: MD5 Fingerprint Detection
        id: filter
        run: |
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          
          CACHE_DIR="/tmp/cms_deploy_cache"
          mkdir -p $CACHE_DIR
          OLD_FINGERPRINT="$CACHE_DIR/last_src_md5.txt"
          
          CURRENT_FINGERPRINT=$(find src/ pom.xml -type f -exec md5sum {} + | sort | md5sum | cut -d' ' -f1)
          echo "Current Source Fingerprint: $CURRENT_FINGERPRINT"

          NEED_BUILD="false"
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
              echo "Decision: Manual Force Build."
              NEED_BUILD="true"
          elif [ ! -f "$OLD_FINGERPRINT" ]; then
              echo "Decision: No cache found. First time build."
              NEED_BUILD="true"
          elif [ "$CURRENT_FINGERPRINT" != "$(cat $OLD_FINGERPRINT)" ]; then
              echo "Decision: Source code changed (Fingerprint mismatch)."
              NEED_BUILD="true"
          else
              echo "Decision: Source code identical. Skip build."
              NEED_BUILD="false"
          fi

          echo "$CURRENT_FINGERPRINT" > "$OLD_FINGERPRINT"
          
          if [ "$NEED_BUILD" = "true" ]; then
              touch ./RUN_MAVEN_BUILD
              [ -d "target" ] && rm -rf target/
          fi
          echo "code_changed=$NEED_BUILD" >> $GITHUB_OUTPUT

      - name: Build with Maven
        run: |
          if [ -f "./RUN_MAVEN_BUILD" ]; then
              echo "Executing Maven Build..."
              export JAVA_HOME=/opt/jdk-17.0.12          # 改这里（你的实际路径）
              export PATH=$JAVA_HOME/bin:/opt/maven/bin:$PATH
              mvn clean package -DskipTests
          else
              echo "Skip Maven: Source code hash is the same."
          fi

      - name: Local Release and Lifecycle Management
        run: |
          export JAVA_HOME=/opt/jdk-17.0.12             # 改这里（你的实际路径）
          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          if [ -f "./RUN_MAVEN_BUILD" ]; then
              echo "Action: Full Versioned Deploy"
              REL_DIR="/app/cms/releases/${{ github.sha }}"
              sudo mkdir -p $REL_DIR
              sudo cp target/*.jar $REL_DIR/my-cms.jar
              sudo ln -snf $REL_DIR/my-cms.jar /app/cms/current.jar
              cd /app/cms/releases && ls -t | tail -n +6 | xargs sudo rm -rf 2>/dev/null || true
              sudo systemctl restart cms
              for i in {1..10}; do
                if ss -tuln | grep -q :8081; then echo "Service UP!"; exit 0; fi
                sleep 3
              done
              exit 1
          fi